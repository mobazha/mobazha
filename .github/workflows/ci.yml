name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  community-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify public history
        run: ./scripts/community/audit-public-history.sh

      - name: Verify attribution notices
        env:
          ATTRIBUTION_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: ./scripts/community/check-attribution.sh

      - name: Verify Community capabilities
        run: ./scripts/community/check-capabilities.sh

      - name: Verify documentation authority boundaries
        run: ./scripts/community/check-documentation-authority.sh

      - name: Verify OEM source-distribution material
        run: ./scripts/community/check-oem-distribution.sh --source

      - name: Test OEM release-artifact check
        run: ./scripts/community/test-oem-distribution.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: node

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: node/go.sum

      - name: Vet
        run: go vet -tags goolm ./...
        working-directory: node

      - name: Test
        run: go test -tags goolm -race -count=1 -timeout 10m ./...
        working-directory: node

  provider-action-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: mobazha
          POSTGRES_PASSWORD: mobazha
          POSTGRES_DB: provider_action_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mobazha -d provider_action_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v6
        with:
          path: node

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: node/go.sum

      - name: Test durable provider action leases and crash recovery
        working-directory: node
        env:
          MOBAZHA_TEST_POSTGRES_DSN: host=127.0.0.1 port=5432 user=mobazha password=mobazha dbname=provider_action_ci sslmode=disable
        run: go test -tags 'goolm integration' -race -count=1 -timeout 5m -run '^(TestFiatProviderAction_Postgres|TestMigrateFiatModels_Postgres)' ./internal/core ./internal/database

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: node

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: node/go.sum

      - name: Build
        run: go build -tags goolm -o /dev/null .
        working-directory: node
