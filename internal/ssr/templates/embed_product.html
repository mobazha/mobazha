<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} — Mobazha</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--text:#1a1a1a;--muted:#6b7280;--border:#e5e7eb;
  --accent:#2563eb;--accent-text:#fff;--card-bg:#fff;
}
.dark{
  --bg:#18181b;--text:#f4f4f5;--muted:#a1a1aa;--border:#3f3f46;
  --accent:#3b82f6;--accent-text:#fff;--card-bg:#27272a;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.4}
.card{display:flex;gap:14px;padding:14px;border:1px solid var(--border);border-radius:10px;background:var(--card-bg);max-width:480px;text-decoration:none;color:inherit}
.card:hover{border-color:var(--accent)}
.img{width:120px;height:120px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--border)}
.info{display:flex;flex-direction:column;justify-content:center;gap:4px;min-width:0;flex:1}
.title{font-size:15px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.desc{font-size:13px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.price{font-size:15px;font-weight:700;color:var(--accent)}
.vendor{font-size:12px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);margin-top:4px}
.badge svg{width:14px;height:14px}
</style>
</head>
<body{{if .Dark}} class="dark"{{end}}>
<a class="card" href="{{.ProductURL}}" target="_blank" rel="noopener noreferrer">
  {{if .ImageURL}}<img class="img" src="{{.ImageURL}}" alt="{{.Title}}" loading="lazy">{{end}}
  <div class="info">
    <div class="title">{{.Title}}</div>
    {{if .Description}}<div class="desc">{{.Description}}</div>{{end}}
    {{if .Price}}<div class="price">{{.Price}} {{.CurrencyCode}}</div>{{end}}
    {{if .VendorName}}<div class="vendor">{{.VendorName}}</div>{{end}}
    <div class="badge">
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zm1 11H9v-2h2v2zm0-4H9V5h2v4z"/></svg>
      on Mobazha
    </div>
  </div>
</a>
<script>
(function(){
  var h=document.documentElement.scrollHeight;
  window.parent.postMessage({type:'mobazha-embed-resize',height:h},'*');
  new ResizeObserver(function(){
    var nh=document.documentElement.scrollHeight;
    if(nh!==h){h=nh;window.parent.postMessage({type:'mobazha-embed-resize',height:h},'*');}
  }).observe(document.body);
})();
</script>
</body>
</html>
