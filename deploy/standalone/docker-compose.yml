# Mobazha Standalone Store — Docker Compose
#
# Usage:
#   1. Copy this file and .env.example to your server
#   2. Edit .env with your configuration
#   3. docker compose up -d
#
# Auto-updates: systemd timer (mobazha-update.timer) checks hourly for new images.
#   View status: systemctl status mobazha-update.timer
#   Trigger now: systemctl start mobazha-update.service

services:
  store:
    image: ghcr.io/mobazha/standalone:${TAG:-stable}
    container_name: mobazha-store
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "4001:4001"     # IPFS swarm (P2P)
      - "9005:9005"     # IPFS swarm (P2P)
    volumes:
      - store-data:/data
      - caddy-data:/data/caddy
      - ${INSTALL_DIR:-/opt/mobazha}:/hostconfig
    environment:
      - STORE_DOMAIN=${STORE_DOMAIN:-}
      - SAAS_API_URL=${SAAS_API_URL:-https://app.mobazha.org}
      - STANDALONE_API_KEY=${STANDALONE_API_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - SAAS_PEER_ID=${SAAS_PEER_ID:-}
      - CONNECTIVITY=${CONNECTIVITY:-nat}
      - TLS_MODE=${TLS_MODE:-internal}
      - TESTNET=${TESTNET:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5102/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  store-data:
  caddy-data:
