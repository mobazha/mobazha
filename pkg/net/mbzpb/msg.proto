syntax = "proto3";
option go_package = "../mbzpb";
package mbzpb;

import "google/protobuf/any.proto";

message Message {
    MessageType messageType     = 1;
    string messageID            = 2;
    uint32 sequence             = 3;
    google.protobuf.Any payload = 4;

    enum MessageType {
        ACK                      = 0;
        PING                     = 1;
        PONG                     = 2;
        FOLLOW                   = 4;
        UNFOLLOW                 = 5;
        STORE                    = 6;
        ORDER                    = 7;
        DISPUTE                  = 8;
        ADDRESS_REQUEST          = 9;
        ADDRESS_RESPONSE         = 10;
        COLLATERAL_CREDENTIAL_REQUEST  = 11;
        COLLATERAL_CREDENTIAL_RESPONSE = 12;
    }
}

// ChatMessage, ChatGroupMessage removed: P2P chat migrated to Matrix.

message StoreMessage {
    repeated bytes cids = 1;
}

message AckMessage {
    string ackedMessageID = 1;
}

message OrderMessage {
    string orderID              = 1;
    MessageType messageType     = 2;
    google.protobuf.Any message = 3;
    bytes signature             = 4;
    string senderPeerID         = 5;

    enum MessageType {
        ORDER_OPEN         = 0;
        ORDER_DECLINE      = 1;
        ORDER_CANCEL       = 2;
        ORDER_CONFIRMATION = 3;
        RATING_SIGNATURES  = 4;
        ORDER_SHIPMENT     = 5;
        ORDER_COMPLETE     = 6;
        DISPUTE_OPEN       = 7;
        DISPUTE_UPDATE     = 8;
        DISPUTE_CLOSE      = 9;
        DISPUTE_ACCEPT     = 10;
        REFUND             = 11;
        PAYMENT_SENT       = 12;
        PAYMENT_FINALIZED  = 13;
        PAYMENT_LOCKED              = 14;  // RWA 确认交易模式资金锁定
        AFTER_SALE_DISPUTE_OPEN     = 15;
    }
}

message AfterSaleDisputeOpen {
    string orderID     = 1;
    string reason      = 2;
    string description = 3;
    uint64 timestamp   = 4;
}

message OrderList {
    repeated OrderMessage messages = 1;
}

message AddressRequestMessage {
    string coin = 1;
}

message AddressResponseMessage {
    string address = 1;
    string coin    = 2;
}

// CollateralCredentialRequest asks the seller Core to project one live local
// allocation into a short-lived credential for the authenticated buyer peer.
message CollateralCredentialRequest {
    string orderID          = 1;
    bytes extensionJson     = 2;
    bytes requirementJson   = 3;
    int64 expiresAtUnix     = 4;
}

// CollateralCredentialResponse carries seller-signed evidence back to the
// buyer. The buyer must still bind it to its own persisted extension state.
message CollateralCredentialResponse {
    string requestMessageID = 1;
    string orderID          = 2;
    bytes extensionJson     = 3;
    bytes requirementJson   = 4;
    bytes credentialJson    = 5;
}

// ChannelRequestMessage, ChannelResponseMessage removed: Channels feature retired.

message Envelope {
    bytes senderPubkey = 1;
    Message message    = 2;
    bytes signature    = 3;
}
