name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: node

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: node/go.sum

      - name: Create workspace
        run: |
          cat > go.work <<'EOF'
          go 1.25.0

          use (
            ./node
          )
          EOF
          sed -i 's/^          //' go.work

      - name: Vet
        run: go vet -tags goolm ./...
        working-directory: node

      - name: Test
        run: go test -tags goolm -race -count=1 -timeout 10m ./...
        working-directory: node

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: node

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: node/go.sum

      - name: Create workspace
        run: |
          cat > go.work <<'EOF'
          go 1.25.0

          use (
            ./node
          )
          EOF
          sed -i 's/^          //' go.work

      - name: Build
        run: go build -tags goolm -o /dev/null .
        working-directory: node
