syntax = "proto3";
option go_package = "../mbzpb";
package mbzpb;

import "common.proto";
import "google/protobuf/timestamp.proto";

message Listing {
    string slug                             = 1;
    ID vendorID                             = 2;
    Metadata metadata                       = 3;
    Item item                               = 4;
    repeated ShippingOption shippingOptions = 5;  // @deprecated: 旧版配送选项，保留以向后兼容
    repeated Tax taxes                      = 6;
    repeated Coupon coupons                 = 7;
    repeated string moderators              = 8;
    string termsAndConditions               = 9;
    string refundPolicy                     = 10;
    string status                           = 11; // "draft", "pending", "private" and "published". Default is "published".
    bool featured                           = 12;
    ShippingProfile shippingProfile         = 13; // Shopify 风格配送档案（包含完整配送信息）

    message Metadata {
        uint32 version                     = 1;
        ContractType contractType          = 2;
        Format format                      = 3;
        google.protobuf.Timestamp expiry   = 4;
        repeated string acceptedCurrencies = 5; // RWA/Crypto 商品接受的支付币种
        string language                    = 6;
        uint32 escrowTimeoutHours          = 7;
        Currency pricingCurrency           = 9;
        RwaTradeMode rwaTradeMode          = 10; // RWA 交易模式
        uint64 rwaEscrowTimeoutSeconds     = 11; // RWA 托管超时时间（秒），默认86400（24小时）
        uint64 rwaListingId                = 12; // RWA 合约 Listing ID（延迟模式必填，用于 createOrderFromListing）

        enum ContractType {
            PHYSICAL_GOOD  = 0;
            DIGITAL_GOOD   = 1;
            SERVICE        = 2;
            CLASSIFIED     = 3;
            CRYPTOCURRENCY = 4;
            RWA_TOKEN      = 5;
        }

        enum Format {
            FIXED_PRICE  = 0;
            MARKET_PRICE = 1;
        }

        enum RwaTradeMode {
            RWA_TRADE_MODE_INSTANT          = 0; // 即时交易（默认）
            RWA_TRADE_MODE_CONFIRM_REQUIRED = 1; // 需要确认
        }
    }

    message Item {
        string title                                = 1;
        string description                          = 2;
        string shortDescription                     = 3;
        string processingTime                       = 4;
        bool nsfw                                   = 5;
        repeated string tags                        = 6;
        repeated Image images                       = 7;
        File introVideo                             = 8;
        repeated string categories                  = 9;
        uint32 grams                                = 10;
        Dimensions dimensions                       = 11;
        string condition                            = 12;
        repeated Option options                     = 13;
        repeated Sku skus                           = 14;
        string price                                = 15;
        string regularPrice                         = 16;
        string salePrice                            = 17;
        repeated OptionalFeature optionalFeatures   = 18;
        string cryptoListingCurrencyCode            = 19;
        float cryptoListingPriceModifier            = 20;
        repeated string altIntroVideoLinks          = 21;
        string minQuantity                          = 22;
        string maxQuantity                          = 23;
        string blockchain                           = 24; // RWA Token 区块链 (ethereum, sepolia, bsc, solana等)
        string tokenAddress                         = 25; // RWA Token 合约地址
        string tokenStandard                        = 26; // Token 标准 (RWA, ERC20, ERC721, ERC1155, ERC3525, SPL等)
        string tokenId                              = 27; // Token ID (ERC721/ERC1155/ERC3525 必填)
        string slotId                               = 28; // Slot ID (ERC3525 专用，表示资产类别/剧目)

        message Option {
            string name                = 1;
            string description         = 2;
            repeated Variant variants  = 3;
            // bool variation = 4; // 已移除：Shopify 模型中所有 option 均参与变体组合

            message Variant {
                string name = 1;
                Image image = 2;
            }
        }

        message Sku {
            repeated Selection selections = 1;
            string productID              = 2;
            string quantity               = 3;
            string price                  = 4;   // 变体绝对价格（Shopify 风格，替代 surcharge）
            repeated Image images         = 5;
            bool downloadable             = 6;
            repeated Download downloads   = 7;
            string compareAtPrice         = 8;   // 划线价/原价（展示折扣用）
            string barcode                = 9;   // 条码（UPC/EAN/ISBN）
            uint32 weight                 = 10;  // 变体重量（克），覆盖 Item.grams

            message Selection {
                string option  = 1;
                string variant = 2;
            }

            message Download {
                string downloadID   = 1;
                string name         = 2;
                string file         = 3;
            }
        }

        message Dimensions {
            uint32 length              = 1;
            uint32 width               = 2;
            uint32 height              = 3;
        }

        message OptionalFeature {
            string name                = 2;
            string surcharge           = 3;
            string skuID               = 4;
            repeated Image images      = 5;
        }
    }

    message ShippingOption {
        uint32 optionID              = 1;
        string name                  = 2;
        ShippingType type            = 3;
        string currency              = 4;
        ServiceType serviceType      = 5;
        repeated string regions = 6;  // ISO 3166-1 alpha-2 codes: "CN", "US", "ALL"
        repeated Service services    = 7;
        FreeShippingThreshold freeShippingThreshold = 8;  // 满额免邮配置

        enum ShippingType {
            LOCAL_PICKUP = 0;
            FIXED_PRICE  = 1;
        }

        enum ServiceType {
            FIRST_RENEWAL_FEE = 0;
            SAME_WEIGHT_SAME_FEE  = 1;
        }

        message Service {
            string name              = 1;
            string estimatedDelivery = 2;
            uint32 startWeight       = 3;
            uint32 endWeight         = 4;

            uint32 firstWeight       = 5;
            string firstFreight      = 6;
            uint32 renewalUnitWeight = 7;
            string renewalUnitPrice  = 8;

            string registrationFee   = 9;
        }

        // 满额免邮配置
        message FreeShippingThreshold {
            bool enabled     = 1;  // 是否启用满额免邮
            string minAmount = 2;  // 最低金额（最小单位）
        }
    }

    message Tax {
        string taxType                  = 1;
        repeated string taxRegions      = 2;  // ISO 3166-1 alpha-2 codes
        bool taxShipping                = 3;
        float percentage                = 4;
    }

    message Coupon {
        string title                           = 1;
        string hash                            = 2;   // 折扣码哈希
        string discountCode                    = 3;   // 折扣码（明文）
        enum DiscountType {
            PERCENT = 0;
            FIXED   = 1;
        }
        DiscountType discountType              = 4;   // 折扣类型
        float percentDiscount                  = 5;   // 百分比折扣（0-99）
        string priceDiscount                   = 6;   // 固定金额折扣（最小单位）
        int32 usageLimit                       = 7;   // 最大使用次数，0 = 无限
        google.protobuf.Timestamp startsAt     = 8;   // 生效时间
        google.protobuf.Timestamp expiresAt    = 9;   // 过期时间
        string minimumOrderAmount              = 10;  // 最低订单金额
    }
}

message SignedListing {
    Listing listing     = 1;
    string cid          = 2;
    bytes signature     = 3;
}

// ============== Shopify 风格配送结构 ==============

// ShippingRate 配送费率
message ShippingRate {
    string id                = 1;  // 费率 ID
    string name              = 2;  // 费率名称（如 "标准配送"、"快递"）
    string price             = 3;  // 价格（最小单位字符串）
    string currency          = 4;  // 货币代码
    string estimatedDelivery = 5;  // 预计送达时间（如 "5-7 天"）
    RateCondition condition  = 6;  // 可选条件（基于重量或价格）
    FreeShippingThreshold freeShippingThreshold = 7;  // 满额免邮配置

    // 费率条件
    message RateCondition {
        ConditionType type = 1;  // 条件类型
        uint32 minValue    = 2;  // 最小值（重量为克，价格为最小单位）
        uint32 maxValue    = 3;  // 最大值（0 表示无上限）

        enum ConditionType {
            NONE   = 0;  // 无条件
            WEIGHT = 1;  // 基于重量
            PRICE  = 2;  // 基于价格
        }
    }

    // 满额免邮配置
    message FreeShippingThreshold {
        bool enabled     = 1;  // 是否启用满额免邮
        string minAmount = 2;  // 最低金额（最小单位）
    }
}

// ShippingZone 配送区域
message ShippingZone {
    string id                   = 1;  // 区域 ID
    string name                 = 2;  // 区域名称（如 "全球"、"亚洲"、"北美"）
    repeated string regions     = 3;  // 配送区域（ISO 3166-1 alpha-2 代码，如 "CN", "US"，或 "ALL"）
    repeated ShippingRate rates = 4;  // 该区域的费率列表
}

// ShippingLocation 发货地点
message ShippingLocation {
    string id        = 1;  // 地点 ID
    string name      = 2;  // 地点名称（如 "北京仓"、"美国仓"）
    string address   = 3;  // 地址（可选）
    bool isDefault   = 4;  // 是否为默认地点
}

// LocationGroup 发货地点组（用于多仓库场景）
message LocationGroup {
    string id                     = 1;  // 地点组 ID
    repeated string locationIds   = 2;  // 关联的发货地点 ID 列表
    repeated ShippingZone zones   = 3;  // 该地点组的配送区域
}

// ShippingProfile 配送档案（Shopify 风格）
// 支持两种模式：
// - 简化模式（单一发货地点）：使用 zones 字段
// - 完整模式（多发货地点）：使用 locationGroups 字段
message ShippingProfile {
    string profileID                        = 1;  // UUID，唯一标识
    string name                             = 2;  // 档案名称：如"默认配送"、"易碎品配送"
    bool isDefault                          = 3;  // 是否为默认档案
    repeated ShippingZone zones             = 4;  // 配送区域列表（简化模式）
    repeated LocationGroup locationGroups   = 5;  // 发货地点组列表（完整模式，多仓库）
    google.protobuf.Timestamp createdAt     = 6;  // 创建时间
    google.protobuf.Timestamp updatedAt     = 7;  // 更新时间
}
