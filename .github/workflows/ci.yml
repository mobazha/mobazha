name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  community-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify public history
        run: ./scripts/community/audit-public-history.sh

      - name: Verify attribution notices
        env:
          ATTRIBUTION_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: ./scripts/community/check-attribution.sh

      - name: Verify Community capabilities
        run: ./scripts/community/check-capabilities.sh

      - name: Verify OEM source-distribution material
        run: ./scripts/community/check-oem-distribution.sh --source

      - name: Test OEM release-artifact check
        run: ./scripts/community/test-oem-distribution.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: node

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: node/go.sum

      - name: Vet
        run: go vet -tags goolm ./...
        working-directory: node

      - name: Test
        run: go test -tags goolm -race -count=1 -timeout 10m ./...
        working-directory: node

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: node

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: node/go.sum

      - name: Build
        run: go build -tags goolm -o /dev/null .
        working-directory: node
